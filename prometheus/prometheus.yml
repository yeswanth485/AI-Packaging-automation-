# Prometheus Configuration for AI Packaging Optimizer

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'packaging-optimizer'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alert rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # Scrape the application metrics
  - job_name: 'packaging-optimizer'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Node Exporter for system metrics (optional)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Scrape PostgreSQL metrics (optional)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Scrape Redis metrics (optional)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
